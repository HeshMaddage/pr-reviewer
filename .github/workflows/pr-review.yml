name: AI PR Review Bot

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  review:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
      contents: read

    steps:
      - name: Fetch PR Diff
        run: |
          curl -s \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3.diff" \
            https://api.github.com/repos/${{ github.repository }}/pulls/${{ github.event.pull_request.number }} \
            -o diff.txt
          echo "Diff size: $(wc -c < diff.txt) bytes"

      - name: Send Diff to Gemini and Post Comment
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          python3 -c "
          import json, urllib.request, os

          # Read diff
          with open('diff.txt') as f:
              diff = f.read()

          if len(diff) > 8000:
              diff = diff[:8000] + '\n\n[...truncated...]'

          prompt = 'You are a code reviewer. Analyse this PR diff and give: 1) A one-line summary 2) Three bullet points of key changes 3) One suggestion.\n\nDIFF:\n' + diff

          payload = json.dumps({'contents': [{'parts': [{'text': prompt}]}]})

          api_key = os.environ['GEMINI_API_KEY']
          url = 'https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=' + api_key

          req = urllib.request.Request(url, data=payload.encode('utf-8'), headers={'Content-Type': 'application/json'}, method='POST')

          with urllib.request.urlopen(req) as resp:
              data = json.load(resp)

          review = data['candidates'][0]['content']['parts'][0]['text']

          comment = '## Robot AI PR Review\n\n' + review + '\n\n---\n*Powered by Gemini 2.5 Flash*'

          token = os.environ['GITHUB_TOKEN']
          repo = os.environ['REPO']
          pr = os.environ['PR_NUMBER']

          url2 = 'https://api.github.com/repos/' + repo + '/issues/' + pr + '/comments'
          body = json.dumps({'body': comment})

          req2 = urllib.request.Request(url2, data=body.encode('utf-8'), headers={'Authorization': 'Bearer ' + token, 'Content-Type': 'application/json', 'Accept': 'application/vnd.github+json'}, method='POST')

          with urllib.request.urlopen(req2) as resp2:
              result = json.load(resp2)
              print('Comment posted: ' + result['html_url'])
          "
